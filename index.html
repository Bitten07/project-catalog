<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/images/android-chrome-192x192.png" type="image/png">
</head>
<body>
    <aside class="aside">
        <nav class="nav">
            <a href="#" class="nav">Home</a>
            <a href="#games-section" class="nav">Jogos</a>
            <a href="#" class="nav">Contato</a>
        </nav>
    </aside>
    <main class="main">
        <header class="header">
            <img src="/images/android-chrome-192x192.png" alt="Capa da loja de games" class="logo-catalog">
            <h1 class="title">Loja de games</h1>
        </header>
        <section class="section">
            <article class="article">
                <img src="/images/persona3reload.png" alt="Capa Persona 3 Reload Jrpg" class="games-cover">
                <h3>Persona 3 Reload</h3>
            </article>
            <article class="article">
                <img src="/images/clair-obscur.e33.png" alt="Capa Clair Obscur Expedition 33 Turn-based-Rpg Rpg" class="games-cover">
                <h3>Clair Obscur:Expedition 33</h3>
            </article>
            <article class="article">
                <h3>Jogo 3</h3>
            </article>
        </section>
        <section class="section" id="games-section">
            <article class="article">
                <h3>Jogo 4</h3>
            </article>
            <article class="article">
                <h3>Jogo 5</h3>
            </article>
            <article class="article">
                <h3>Jogo 6</h3>
            </article>
        </section>
    </main>
</body>
</html>
