<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Games</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="/images/android-chrome-192x192.png" type="image/png">
</head>
<body>
    <aside class="aside">
        <nav class="nav">
            <a href="#home" class="nav">Home</a>
            <a href="#games-section" class="nav">Jogos</a>
            <a href="mailto:joaopedrobittensilva@gmail.com" class="nav">Contato</a>
        </nav>
    </aside>
    <main class="main">
        <header class="header" id="home">
            <img src="/images/android-chrome-192x192.png" alt="Capa da loja de games" class="logo-catalog">
            <h1 class="title">Loja de games</h1>
        </header>
        <section class="section">
            
            <a href="https://store.steampowered.com/app/2161700/Persona_3_Reload/">
                <article class="article">
                    <img src="/images/persona3R.png" alt="Capa Persona 3 Reload Jrpg" class="games-cover">
                    <h3>Persona 3<br>Reload</h3>
                </article>
            </a>

            <a href="https://store.steampowered.com/app/1903340/Clair_Obscur_Expedition_33/">
                <article class="article">
                    <img src="/images/clair-obscur.e33.png" alt="Capa Clair Obscur Expedition 33 Turn-based-Rpg Rpg" class="games-cover">
                    <h3>Clair Obscur:<br>Expedition 33</h3>
                </article>
            </a>

            <a href="https://store.steampowered.com/app/418370/Resident_Evil_7_Biohazard/">
                <article class="article">
                    <img src="/images/residentEvil7.png" alt="Capa Resident Evil 7 Jogo Terror Medo" class="games-cover">
                    <h3>Resident Evil:<br>Biohazard</h3>
                </article>
            </a>    

        </section>

        <section class="section" id="games-section">
            
            <a href="https://store.steampowered.com/app/1245620/ELDEN_RING/">
                <article class="article">
                    <img src="/images/Elden-Ring.png" alt="Capa Elden Ring Rpg Soulslike" class="games-cover">
                    <h3>Elden Ring</h3>
                </article>
            </a>
            
            <a href="https://store.steampowered.com/app/1687950/Persona_5_Royal/">
                <article class="article">
                    <img src="/images/persona5R.png" alt="Capa Persona 5 Royal Jrpg" class="games-cover">
                    <h3>Persona 5<br>Royal</h3>
                </article>
            </a>
            
            <a href="https://store.steampowered.com/app/2963950/Persona_4_Revival/">
                <article class="article">
                    <img src="/images/persona4R.png" alt="Capa Persona 4 revival Jrpg" class="games-cover">
                    <h3>Persona 4<br>Revival</h3>
                </article>
            </a>

        </section>
    </main>
</body>
</html>
